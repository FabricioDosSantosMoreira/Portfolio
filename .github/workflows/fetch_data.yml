name: Fetch and Save GitHub Repository Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v3
      
      - name: Set Up Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local pull.rebase true
      
      - name: Remove Old Data And Commit
        run: |
          rm -f "./data/repo_data.json"
          
          _date=$(TZ="UTC" date +"%d/%m/%Y %H:%M") 

          git add .
          git commit --allow-empty -m "[REMOVE] - repo_data.json ($_date)"

      - name: Fetch Repository Data Using GitHub API
        env:
          READ_ACCESS_TOKEN: ${{ secrets.READ_ACCESS_TOKEN }}
        run: |
          EXCLUDED_REPOS=("Hello-World" "YTDownloader" "dio-lab-open-source" "alura-challenge-amigo-secreto")
          OWNER="FabricioDosSantosMoreira"
          
          echo "Fetching GitHub Data | All Repo Names..."

          RESPONSE=$(curl -X POST -H "Authorization: Bearer $READ_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ user(login: \"$OWNER\") { repositories(first: 100) { nodes { name } } } }\"}" \
            https://api.github.com/graphql
          )
          echo "Data Fetched | $RESPONSE"

          # Extrai os nomes dos repositórios e os armazena em um array
          REPO_NAMES=($(echo "$RESPONSE" | jq -r '.data.user.repositories.nodes[].name'))
          
          echo "REPO_NAMES | ${REPO_NAMES[@]}"
          




          # 'REPOS' must be on the format 'OWNER/REPOSITORY'
          REPOS=(
            "FabricioDosSantosMoreira/react-web-calculator"
            "FabricioDosSantosMoreira/DIO.me"
            "FabricioDosSantosMoreira/PlanetsVsGalaxiesClassifier"
            "FabricioDosSantosMoreira/LeetCode-Solutions"
            "FabricioDosSantosMoreira/TicTacToe"
            "FabricioDosSantosMoreira/SENAI-projeto-django"
            "FabricioDosSantosMoreira/XPe-Python-Bootcamp"
            "FabricioDosSantosMoreira/PyQT5-Basic-Examples"
            "FabricioDosSantosMoreira/Portfolio"
            "FabricioDosSantosMoreira/SENAI-desafio-saep"
          )

          # Open 'repo_data.json' with a '['
          echo "[" > "./data/repo_data.json"

          # Iterate over 'REPOS' to search data
          for REPO in "${REPOS[@]}"; do
            OWNER=$(echo "$REPO" | cut -d '/' -f 1)
            NAME=$(echo "$REPO" | cut -d '/' -f 2)

            echo "Fetching Data | $REPO"

            RESPONSE=$(curl -X POST -H "Authorization: Bearer $READ_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ repository(owner: \\\"$OWNER\\\", name: \\\"$NAME\\\") { name description url openGraphImageUrl stargazers { totalCount } forks { totalCount } watchers { totalCount } languages(first: 100) { edges { node { name } size } } } }\"}" \
              https://api.github.com/graphql
            )

            echo "Data Fetched | $RESPONSE"

            # Adds 'RESPONSE' to 'repo_data.json'
            echo "$RESPONSE" | jq ".data.repository" >> "./data/repo_data.json"
            
            # Adds a ',' to 'repo_data.json' to separate objects
            echo "," >> "./data/repo_data.json"
          done
          
          # Removes the last ','
          sed -i '$ s/,$//' "./data/repo_data.json"

          # Closes 'repo_data.json' with a ']'
          echo "]" >> "./data/repo_data.json"

      - name: Fetch And Commit Color Data Using CURL
        env:
          READ_ACCESS_TOKEN: ${{ secrets.READ_ACCESS_TOKEN }}
        run: |
          echo "Downloading GitHub Colors JSON..."
          
          # -f, --fail, Fail silently (no output at all) on HTTP errors.
          # -o, --output, Write output to 'data/github_color_data.json' instead of stdout
          if curl -f -o "./data/github_color_data.json" https://raw.githubusercontent.com/ozh/github-colors/master/colors.json; then
            ls
            ls ./data

            git status

            _date=$(TZ="UTC" date +"%d/%m/%Y %H:%M")


            git add "./data/github_color_data.json"
            git commit --allow-empty -m "[UPDATE] - github_color_data.json ($_date)"
          fi




      - name: Commit and Push Data
        run: |
          _date=$(TZ="UTC" date +"%d/%m/%Y %H:%M")
          
          git add "./data/repo_data.json"
          git commit --allow-empty -m "[UPDATE] - repo_data.json ($_date)"

          git pull
          git push
