name: Fetch and Save Repository Data

on:
  push:
    branches:
      - main

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Git
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://<PUSH_TOKEN>@github.com/${{ github.repository }}.git
      env:
        PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Fetch data and update JSON
      run: |
        echo "[" > repo_data.json
        for REPO in "${REPOS[@]}"; do
          OWNER=$(echo "$REPO" | cut -d '/' -f 1)
          NAME=$(echo "$REPO" | cut -d '/' -f 2)
          echo "Buscando dados de $REPO..."
          RESPONSE=$(curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ repository(owner: \\\"$OWNER\\\", name: \\\"$NAME\\\") { name owner { login } openGraphImageUrl } }\"}" \
            https://api.github.com/graphql)
          echo "$RESPONSE" | jq '.data.repository' >> repo_data.json
          echo "," >> repo_data.json
        done
        sed -i '$ s/,$//' repo_data.json
        echo "]" >> repo_data.json

    - name: Commit and push changes
      run: |
        git add repo_data.json
        git commit -m "[UPDATE] - Fetch Data"
        git push
      env:
        PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
