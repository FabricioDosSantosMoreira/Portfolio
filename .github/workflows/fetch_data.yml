name: Fetch and Save GitHub Repository Data

on:
  push:
    branches:
      - main

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v3
      
      - name: Set Up Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local pull.rebase true
      
      - name: Remove Old Data And Commit
        run: |
          rm -f data.json
          
          _date=$(TZ="UTC" date +"%d/%m/%Y %H:%M") 

          git add .
          git commit --allow-empty -m "[REMOVE] - data.json ($_date)"

      - name: Fetch Data Using GitHub API
        env:
          READ_ACCESS_TOKEN: ${{ secrets.READ_ACCESS_TOKEN }}
        run: |
          # 'REPOS' must be on the format 'OWNER/REPOSITORY'
          REPOS=(
            "FabricioDosSantosMoreira/react-web-calculator"
            "FabricioDosSantosMoreira/DIO.me"
          )

          # Open a new json
          echo "[" > data.json

          # Itera sobre os repositórios e busca dados
          for REPO in "${REPOS[@]}"; do
            OWNER=$(echo "$REPO" | cut -d '/' -f 1)
            NAME=$(echo "$REPO" | cut -d '/' -f 2)

            echo "Fetching Data | $REPO"

            RESPONSE=$(curl -X POST -H "Authorization: Bearer $READ_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ repository(owner: \\\"$OWNER\\\", name: \\\"$NAME\\\") { name url description openGraphImageUrl } }\"}" \
              https://api.github.com/graphql
            )

            # Adiciona os dados ao arquivo JSON
            echo "$RESPONSE" | jq '.data.repository' >> data.json
            echo "," >> data.json # Adiciona uma vírgula para separar os objetos
          done

          # Remove a última vírgula, remove a linha em branco e fecha o array JSON
          #sed -i -e '$ s/,$//' data.json
          #sed -i -e '$ s/\n$//' data.json

          echo "]" >> data.json

      - name: Commit and Push Data
        run: |
          _date=$(TZ="UTC" date +"%d/%m/%Y %H:%M")
          
          git add .
          git commit --allow-empty -m "[UPDATE] - data.json ($_date)"

          git pull
          git push
